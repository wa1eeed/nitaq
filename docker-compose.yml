# ─── Naqla Platform — Development Infrastructure ───────────────
# Run: docker compose up -d
# Stop: docker compose down
# Reset: docker compose down -v
services:
  postgres:
    image: postgres:16-alpine
    container_name: naqla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: naqla
      POSTGRES_PASSWORD: naqla_dev_pass
      POSTGRES_DB: naqla_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naqla -d naqla_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - naqla-network

  redis:
    image: redis:7-alpine
    container_name: naqla-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - naqla-network

  minio:
    image: minio/minio:latest
    container_name: naqla-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - naqla-network

  minio-init:
    image: minio/mc:latest
    container_name: naqla-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/naqla-files;
      mc anonymous set download local/naqla-files;
      echo 'MinIO bucket initialized successfully';
      exit 0;
      "
    networks:
      - naqla-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: naqla-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - naqla-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  naqla-network:
    driver: bridge
